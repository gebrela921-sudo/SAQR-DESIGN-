<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAQR DESIGN | النظام المتكامل</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #1a1a1a; --txt: #e0e0e0; --red: #ff4444; --green: #25d366; --blue: #2196F3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--txt); margin: 0; padding-bottom: 50px; }
        
        header { text-align: center; padding: 20px; border-bottom: 2px solid var(--gold); background: #111; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); margin-bottom: 10px; }
        
        nav { display: flex; justify-content: center; background: #1a1a1a; padding: 10px; gap: 15px; flex-wrap: wrap; }
        nav button { background: none; border: none; color: var(--gold); cursor: pointer; font-weight: bold; font-size: 14px; }

        .container { max-width: 900px; margin: 20px auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        button { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; width: 100%; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #111; }
        th, td { border: 1px solid #333; padding: 10px; text-align: right; font-size: 13px; }
        th { color: var(--gold); }

        .chat-box { height: 350px; background: #000; border: 1px solid #333; overflow-y: auto; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; position: relative; }
        .msg.sent { background: var(--gold); color: #000; align-self: flex-end; }
        .msg.received { background: #333; color: #fff; align-self: flex-start; }
        .msg img { max-width: 150px; display: block; border-radius: 5px; margin-bottom: 5px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .product-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <img id="siteLogo" src="" class="logo-img" style="display:none;">
    <h1 style="color:var(--gold); margin:0;">SAQR DESIGN 🦅</h1>
</header>

<nav id="mainNav" style="display:none;">
    <button onclick="router('homePage')">المعرض</button>
    <button onclick="router('chatPage')">المراسلة</button>
    <button id="adminBtn" style="display:none;" onclick="router('adminDash')">لوحة التحكم</button>
    <button onclick="location.reload()" style="color:var(--red)">خروج</button>
</nav>

<div class="container">
    
    <div id="loginPage" class="page active">
        <div class="card">
            <h3>تسجيل الدخول</h3>
            <input type="number" id="lPhone" placeholder="رقم الهاتف">
            <input type="password" id="lPass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleLogin()">دخول</button>
            <p style="text-align:center">جديد؟ <a href="#" onclick="router('regPage')" style="color:var(--gold)">أنشئ حسابك</a></p>
        </div>
    </div>

    <div id="regPage" class="page">
        <div class="card">
            <h3>إنشاء حساب فخم</h3>
            <input type="text" id="rName" placeholder="الاسم الكامل">
            <input type="email" id="rEmail" placeholder="البريد الإلكتروني">
            <input type="number" id="rPhone" placeholder="رقم الهاتف">
            <input type="password" id="rPass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleRegister()">تسجيل</button>
            <button onclick="router('loginPage')" style="background:none; color:#777; width:100%">رجوع</button>
        </div>
    </div>

    <div id="homePage" class="page">
        <h2 style="color:var(--gold)">معرض التصاميم</h2>
        <div id="galleryArea" class="gallery-grid"></div>
    </div>

    <div id="chatPage" class="page">
        <div class="card">
            <h3 id="chatPartner">المراسلة</h3>
            <div id="adminChatSelect" style="display:none;">
                <label>اختر العميل للمراسلة:</label>
                <select id="selectTarget" onchange="renderChat()"></select>
            </div>
            <div id="chatBox" class="chat-box"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
                <input type="file" id="chatFile" style="display:none;" onchange="sendFile(this)">
                <button onclick="document.getElementById('chatFile').click()">📎</button>
                <button class="btn-gold" style="width:auto;" onclick="sendTextMsg()">إرسال</button>
            </div>
        </div>
    </div>

    <div id="adminDash" class="page">
        <div class="card">
            <h2>لوحة التحكم</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-blue" onclick="router('adminProducts')">المنتجات</button>
                <button class="btn-blue" onclick="router('adminUsers')">الزبائن</button>
                <button class="btn-gold" onclick="router('adminSettings')">الإعدادات والشعار</button>
            </div>
        </div>
    </div>

    <div id="adminProducts" class="page">
        <div class="card">
            <h3>إضافة / إدارة المنتجات</h3>
            <input type="text" id="pName" placeholder="اسم المنتج">
            <input type="text" id="pPrice" placeholder="السعر">
            <input type="file" id="pImg" accept="image/*">
            <button class="btn-gold" onclick="uploadProduct()">إضافة للمعرض</button>
            <div id="adminProdsList" style="margin-top:20px;"></div>
            <button onclick="router('adminDash')">رجوع</button>
        </div>
    </div>

    <div id="adminUsers" class="page">
        <div class="card">
            <h3>قائمة الزبائن (تعديل كامل)</h3>
            <div id="usersListArea" style="overflow-x:auto;"></div>
            <button onclick="router('adminDash')">رجوع</button>
        </div>
    </div>

    <div id="adminSettings" class="page">
        <div class="card">
            <h3>تغيير شعار الموقع</h3>
            <input type="file" onchange="updateLogo(this)">
            <hr>
            <h3>رسالة جماعية (للجميع)</h3>
            <textarea id="bcMsg" placeholder="اكتب هنا..."></textarea>
            <button class="btn-gold" onclick="sendBroadcast()">إرسال برودكاست</button>
            <button onclick="router('adminDash')">رجوع</button>
        </div>
    </div>

</div>

<script>
    let users = JSON.parse(localStorage.getItem('SAQR_USERS')) || [];
    let products = JSON.parse(localStorage.getItem('SAQR_PRODS')) || [];
    let messages = JSON.parse(localStorage.getItem('SAQR_MSGS')) || [];
    let siteLogo = localStorage.getItem('SAQR_LOGO') || "";
    let sessionUser = null;
    const adminNum = "01004251979";

    // تفعيل الشعار عند التحميل
    if(siteLogo) { 
        document.getElementById('siteLogo').src = siteLogo; 
        document.getElementById('siteLogo').style.display = 'inline-block';
    }

    function router(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'homePage') renderGallery();
        if(id === 'adminUsers') renderUsersAdmin();
        if(id === 'adminProducts') renderProductsAdmin();
        if(id === 'chatPage') {
            if(sessionUser.phone === adminNum) {
                document.getElementById('adminChatSelect').style.display = 'block';
                fillUserSelect();
            }
            renderChat();
        }
    }

    // --- الدخول والتسجيل ---
    function handleRegister() {
        const n = document.getElementById('rName').value, e = document.getElementById('rEmail').value, 
              p = document.getElementById('rPhone').value, ps = document.getElementById('rPass').value;
        if(n && e && p && ps) {
            users.push({name: n, email: e, phone: p, pass: ps});
            localStorage.setItem('SAQR_USERS', JSON.stringify(users));
            alert("تم التسجيل"); router('loginPage');
        }
    }

    function handleLogin() {
        const p = document.getElementById('lPhone').value, ps = document.getElementById('lPass').value;
        if(p === adminNum && ps === adminNum) {
            sessionUser = {name: "المشرف", phone: adminNum};
            showNav(true); router('adminDash');
        } else {
            const user = users.find(u => u.phone === p && u.pass === ps);
            if(user) { sessionUser = user; showNav(); router('homePage'); }
            else alert("بيانات خاطئة");
        }
    }

    function showNav(isAdmin = false) {
        document.getElementById('mainNav').style.display = 'flex';
        if(isAdmin) document.getElementById('adminBtn').style.display = 'inline';
    }

    // --- إدارة المنتجات ---
    function uploadProduct() {
        const n = document.getElementById('pName').value, pr = document.getElementById('pPrice').value, f = document.getElementById('pImg').files[0];
        if(n && pr && f) {
            const r = new FileReader();
            r.onload = (e) => {
                products.push({id: Date.now(), name: n, price: pr, img: e.target.result});
                localStorage.setItem('SAQR_PRODS', JSON.stringify(products));
                renderProductsAdmin();
            };
            r.readAsDataURL(f);
        }
    }

    function renderProductsAdmin() {
        let h = `<table><tr><th>المنتج</th><th>السعر</th><th>تحكم</th></tr>`;
        products.forEach((p, i) => {
            h += `<tr>
                <td><input value="${p.name}" onchange="editProd(${i}, 'name', this.value)"></td>
                <td><input value="${p.price}" onchange="editProd(${i}, 'price', this.value)"></td>
                <td><button class="btn-red" onclick="deleteProd(${i})">حذف</button></td>
            </tr>`;
        });
        document.getElementById('adminProdsList').innerHTML = h + `</table>`;
    }

    function editProd(idx, key, val) { products[idx][key] = val; localStorage.setItem('SAQR_PRODS', JSON.stringify(products)); }
    function deleteProd(idx) { products.splice(idx, 1); localStorage.setItem('SAQR_PRODS', JSON.stringify(products)); renderProductsAdmin(); }

    // --- إدارة الزبائن ---
    function renderUsersAdmin() {
        let h = `<table><tr><th>الاسم</th><th>الايميل</th><th>الهاتف</th><th>باسورد</th><th>حذف</th></tr>`;
        users.forEach((u, i) => {
            h += `<tr>
                <td><input value="${u.name}" onchange="updateU(${i}, 'name', this.value)"></td>
                <td><input value="${u.email}" onchange="updateU(${i}, 'email', this.value)"></td>
                <td><input value="${u.phone}" onchange="updateU(${i}, 'phone', this.value)"></td>
                <td><input value="${u.pass}" onchange="updateU(${i}, 'pass', this.value)"></td>
                <td><button class="btn-red" onclick="deleteU(${i})">X</button></td>
            </tr>`;
        });
        document.getElementById('usersListArea').innerHTML = h + `</table>`;
    }
    function updateU(i, k, v) { users[i][k] = v; localStorage.setItem('SAQR_USERS', JSON.stringify(users)); }
    function deleteU(i) { users.splice(i, 1); localStorage.setItem('SAQR_USERS', JSON.stringify(users)); renderUsersAdmin(); }

    // --- نظام الشات والاستفسار ---
    function fillUserSelect() {
        const s = document.getElementById('selectTarget');
        s.innerHTML = users.map(u => `<option value="${u.phone}">${u.name} (${u.phone})</option>`).join('');
    }

    function renderChat() {
        const box = document.getElementById('chatBox');
        box.innerHTML = "";
        let target = (sessionUser.phone === adminNum) ? document.getElementById('selectTarget').value : adminNum;
        
        messages.filter(m => (m.from === sessionUser.phone && m.to === target) || (m.from === target && m.to === sessionUser.phone))
        .forEach(m => {
            const side = m.from === sessionUser.phone ? 'sent' : 'received';
            let content = "";
            if(m.prod) content += `<div style="border-bottom:1px solid #555; margin-bottom:5px; font-weight:bold;">استفسار عن: ${m.prod}</div>`;
            if(m.img) content += `<img src="${m.img}">`;
            if(m.text) content += `<div>${m.text}</div>`;
            box.innerHTML += `<div class="msg ${side}">${content}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    function askAbout(pName, pImg) {
        messages.push({from: sessionUser.phone, to: adminNum, prod: pName, img: pImg, text: "أريد الاستفسار عن هذا التصميم", time: Date.now()});
        localStorage.setItem('SAQR_MSGS', JSON.stringify(messages));
        router('chatPage');
    }

    function sendTextMsg() {
        const txt = document.getElementById('chatInput').value;
        if(!txt) return;
        let target = (sessionUser.phone === adminNum) ? document.getElementById('selectTarget').value : adminNum;
        messages.push({from: sessionUser.phone, to: target, text: txt, time: Date.now()});
        localStorage.setItem('SAQR_MSGS', JSON.stringify(messages));
        document.getElementById('chatInput').value = "";
        renderChat();
    }

    function sendFile(input) {
        const f = input.files[0];
        const r = new FileReader();
        r.onload = (e) => {
            let target = (sessionUser.phone === adminNum) ? document.getElementById('selectTarget').value : adminNum;
            messages.push({from: sessionUser.phone, to: target, img: e.target.result, time: Date.now()});
            localStorage.setItem('SAQR_MSGS', JSON.stringify(messages));
            renderChat();
        };
        r.readAsDataURL(f);
    }

    // --- المعرض ---
    function renderGallery() {
        const area = document.getElementById('galleryArea');
        area.innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}">
                <div style="padding:10px">
                    <h4 style="margin:0">${p.name}</h4>
                    <p style="color:var(--gold); margin:5px 0">${p.price}</p>
                    <button class="btn-gold" style="padding:5px" onclick="askAbout('${p.name}', '${p.img}')">استفسار</button>
                </div>
            </div>
        `).join('');
    }

    // --- إعدادات ---
    function updateLogo(input) {
        const r = new FileReader();
        r.onload = (e) => {
            localStorage.setItem('SAQR_LOGO', e.target.result);
            location.reload();
        };
        r.readAsDataURL(input.files[0]);
    }

    function sendBroadcast() {
        const txt = document.getElementById('bcMsg').value;
        users.forEach(u => {
            messages.push({from: adminNum, to: u.phone, text: "📢 رسالة جماعية: " + txt, time: Date.now()});
        });
        localStorage.setItem('SAQR_MSGS', JSON.stringify(messages));
        alert("تم الإرسال للجميع");
    }
</script>
    <footer style="text-align: center; width: 100%; padding: 40px 0; margin-top: 100px; border-top: 1px solid rgba(255,215,0,0.2);">
    <p style="margin: 0; color: #fff; font-size: 14px; direction: rtl;">
        &copy; 2026 <span style="color: #ffd700; font-weight: bold;">SAQR DESIGN</span>. جميع الحقوق محفوظة.
    </p>
    </footer>
    
</body>
</html>
