<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAQR DESIGN | الفخامة</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #1a1a1a; --txt: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: var(--txt); margin: 0; padding-bottom: 80px; }
        header { text-align: center; padding: 30px; border-bottom: 2px solid var(--gold); background: linear-gradient(to bottom, #111, var(--dark)); }
        
        /* الشعار */
        .logo-container { position: relative; display: inline-block; }
        .logo-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); object-fit: cover; background: #000; }
        
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h3 { color: var(--gold); text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 12px; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: var(--gold); outline: none; }
        
        button { width: 100%; padding: 14px; background: linear-gradient(45deg, var(--gold), #b8952d); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 10px 0; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        .section { display: none; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .product-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; margin-bottom: 25px; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        .p-info { padding: 20px; }
        .price-tag { color: var(--gold); font-size: 22px; font-weight: bold; display: block; margin: 10px 0; }
        
        .order-box { background: #252525; padding: 15px; border-right: 5px solid var(--gold); margin: 15px 0; border-radius: 8px; font-size: 14px; line-height: 1.6; }
        .whatsapp-btn { position: fixed; bottom: 20px; left: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; text-align: center; line-height: 60px; font-size: 30px; text-decoration: none; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 1000; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img id="mainLogo" src="2615.png" class="logo-img" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=SD&backgroundColor=d4af37'">
    </div>
    <h1 style="color:var(--gold); margin:15px 0 0 0; letter-spacing: 1px;">SAQR DESIGN</h1>
</header>

<div class="container">
    
    <div id="loginPage" class="section active">
        <div class="card">
            <h3>تسجيل دخول</h3>
            <input type="number" id="lPhone" placeholder="رقم الهاتف">
            <input type="password" id="lPass" placeholder="كلمة المرور">
            <button onclick="handleLogin()">دخول</button>
            <p style="text-align:center; font-size:14px">جديد هنا؟ <a href="#" onclick="showPage('regPage')" style="color:var(--gold); text-decoration:none;">أنشئ حسابك الآن</a></p>
        </div>
    </div>

    <div id="regPage" class="section">
        <div class="card">
            <h3>انضم إلى صقر ديزاين</h3>
            <input type="text" id="rName" placeholder="الاسم بالكامل">
            <input type="number" id="rPhone" placeholder="رقم الهاتف">
            <input type="email" id="rEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="rPass" placeholder="كلمة المرور">
            <button onclick="handleRegister()">إنشاء حساب فخم</button>
            <p style="text-align:center; font-size:14px">عندك حساب؟ <a href="#" onclick="showPage('loginPage')" style="color:var(--gold); text-decoration:none;">سجل دخول</a></p>
        </div>
    </div>

    <div id="adminPage" class="section">
        <div class="card">
            <h3>لوحة التحكم Eagle Eye 🦅</h3>
            <label style="font-size: 12px; color: var(--gold);">تغيير شعار الموقع:</label>
            <input type="file" id="logoUpload" accept="image/*" onchange="updateLogo(this)">
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <input type="text" id="pName" placeholder="اسم التصميم">
            <input type="text" id="pPrice" placeholder="السعر (مثلاً: 1000 ج.م)">
            <textarea id="pDesc" placeholder="وصف التصميم ومميزاته..."></textarea>
            <input type="file" id="pImg" accept="image/*">
            <button onclick="uploadProduct()">نشر في المعرض</button>
            
            <h3 style="margin-top:40px; border-top:1px solid #333; padding-top:20px;">الطلبات الواردة</h3>
            <div id="ordersArea"></div>
            
            <button onclick="location.reload()" style="background:#444; color:#fff; margin-top:30px;">تسجيل خروج</button>
        </div>
    </div>

    <div id="homePage" class="section">
        <h2 style="text-align:center; color:var(--gold); margin-bottom:25px;">معرض الإبداع</h2>
        <div id="galleryArea"></div>
    </div>

</div>

<a href="https://wa.me/201004251979" class="whatsapp-btn">📱</a>

<script>
    let users = JSON.parse(localStorage.getItem('SAQR_USERS')) || [];
    let products = JSON.parse(localStorage.getItem('SAQR_PRODS')) || [];
    let orders = JSON.parse(localStorage.getItem('SAQR_ORDERS')) || [];
    let sessionUser = null;

    // تفعيل الشعار المحفوظ
    if(localStorage.getItem('SAQR_LOGO')) {
        document.getElementById('mainLogo').src = localStorage.getItem('SAQR_LOGO');
    }

    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function handleRegister() {
        const n = document.getElementById('rName').value;
        const p = document.getElementById('rPhone').value;
        const e = document.getElementById('rEmail').value;
        const ps = document.getElementById('rPass').value;
        if(n && p && e && ps) {
            users.push({name: n, phone: p, email: e, pass: ps});
            localStorage.setItem('SAQR_USERS', JSON.stringify(users));
            alert("أهلاً بك يا " + n + "! تم إنشاء حسابك.");
            showPage('loginPage');
        } else { alert("الرجاء إدخال كافة البيانات"); }
    }

    function handleLogin() {
        const p = document.getElementById('lPhone').value;
        const ps = document.getElementById('lPass').value;

        if(p === "01004251979" && ps === "01004251979") {
            showPage('adminPage');
            renderOrders();
        } else {
            const user = users.find(u => u.phone === p && u.pass === ps);
            if(user) {
                sessionUser = user;
                showPage('homePage');
                renderGallery();
            } else { alert("بيانات الدخول غير صحيحة"); }
        }
    }

    function updateLogo(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('mainLogo').src = e.target.result;
            localStorage.setItem('SAQR_LOGO', e.target.result);
            alert("تم تحديث الشعار بنجاح!");
        }
        reader.readAsDataURL(file);
    }

    function uploadProduct() {
        const n = document.getElementById('pName').value;
        const pr = document.getElementById('pPrice').value;
        const d = document.getElementById('pDesc').value;
        const f = document.getElementById('pImg').files[0];

        if(n && pr && f) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                products.push({name: n, price: pr, desc: d, img: ev.target.result});
                localStorage.setItem('SAQR_PRODS', JSON.stringify(products));
                alert("تم إضافة العمل للمعرض!");
                renderGallery();
            };
            reader.readAsDataURL(f);
        } else { alert("أكمل بيانات المنتج"); }
    }

    function renderGallery() {
        const area = document.getElementById('galleryArea');
        area.innerHTML = products.length === 0 ? "<p style='text-align:center'>لا توجد أعمال معروضة حالياً</p>" : "";
        products.forEach((p) => {
            area.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="p-info">
                        <h3>${p.name}</h3>
                        <p style="color:#bbb; font-size:14px">${p.desc}</p>
                        <span class="price-tag">${p.price}</span>
                        <button onclick="makeOrder('${p.name}')">طلب هذا التصميم</button>
                    </div>
                </div>`;
        });
    }

    function makeOrder(pName) {
        const order = {
            item: pName,
            clientName: sessionUser.name,
            clientPhone: sessionUser.phone,
            date: new Date().toLocaleString('ar-EG')
        };
        orders.push(order);
        localStorage.setItem('SAQR_ORDERS', JSON.stringify(orders));
        
        const msg = `طلب جديد من: ${sessionUser.name}%0Aالمنتج: ${pName}%0Aالهاتف: ${sessionUser.phone}`;
        window.open(`https://wa.me/201004251979?text=${msg}`);
    }

    function renderOrders() {
        const area = document.getElementById('ordersArea');
        area.innerHTML = orders.length === 0 ? "<p style='color:#777; text-align:center'>لا توجد طلبات بعد</p>" : "";
        orders.slice().reverse().forEach(o => {
            area.innerHTML += `
                <div class="order-box">
                    <span style="color:var(--gold)">📦 المنتج: ${o.item}</span><br>
                    👤 العميل: ${o.clientName}<br>
                    📞 الهاتف: ${o.clientPhone}<br>
                    🕒 التوقيت: ${o.date}
                </div>`;
        });
    }
</script>

</body>
</html>
